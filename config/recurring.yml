production:
  # ── Housekeeping ──────────────────────────────────────────────────────────
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # ── Deal pipeline — every Wednesday at 8:00 AM ───────────────────────────
  fetch_weekly_deals:
    class: FetchDealsJob
    schedule: every week on wednesday at 8am
    description: "Scrapes Publix weekly ad and matches deals to ingredients"
