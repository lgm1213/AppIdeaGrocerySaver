production:
  # ── Housekeeping ──────────────────────────────────────────────────────────
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # ── Deal pipeline — every Wednesday at 8:00 AM ───────────────────────────
  fetch_weekly_deals:
    class: FetchDealsJob
    schedule: every week on wednesday at 8am
    description: "Scrapes Publix weekly ad and matches deals to ingredients"

  # ── Deal alerts — every Wednesday at 10:00 AM (after scrape + match) ────
  send_deal_alerts:
    class: SendDealAlertsJob
    schedule: every week on wednesday at 10am
    description: "Emails users whose liked/rated recipe ingredients are on sale this week"
