# ─────────────────────────────────────────────────────────────────────────────
# GrocerySaver — Kamal deploy config
#
# ── Pre-deploy checklist ──────────────────────────────────────────────────────
#
# Step 1 — Fill in placeholders in this file (search for YOUR_):
#   • YOUR_DOCKERHUB_USER  → your Docker Hub username
#   • YOUR_SERVER_IP       → public IP of your Ubuntu 22.04+ VPS
#   • YOUR_DOMAIN          → your domain (e.g. grocerysaver.app)
#
# Step 2 — Uncomment the proxy: block below once DNS A record points to
#          YOUR_SERVER_IP (Kamal will provision a Let's Encrypt cert).
#
# Step 3 — Export secrets in your shell before running kamal:
#   export KAMAL_REGISTRY_PASSWORD="<docker hub token>"
#   export POSTGRES_PASSWORD="<strong random password>"
#   (RAILS_MASTER_KEY is read automatically from config/master.key)
#
# Step 4 — First deploy:
#   kamal setup          # provisions server, installs Docker, starts accessories
#   kamal deploy         # builds image, pushes to registry, deploys
#
# Step 5 — After first deploy:
#   kamal app exec "bin/rails db:seed"   # seeds Publix stores + demo user
#   kamal app exec "bin/rails runner 'FetchDealsJob.perform_now'"  # first scrape
#
# ─────────────────────────────────────────────────────────────────────────────

service: grocery_saver
image: YOUR_DOCKERHUB_USER/grocery_saver

# ── Servers ───────────────────────────────────────────────────────────────────
servers:
  web:
    - YOUR_SERVER_IP
  job:
    hosts:
      - YOUR_SERVER_IP
    cmd: bin/jobs

# ── SSL / Proxy ───────────────────────────────────────────────────────────────
# Uncomment once domain DNS points to the server and you want Let's Encrypt SSL.
# Also enable config.assume_ssl and config.force_ssl in config/environments/production.rb.
#
# proxy:
#   ssl: true
#   host: YOUR_DOMAIN   # e.g. grocerysaver.app

# ── Registry ──────────────────────────────────────────────────────────────────
registry:
  server: docker.io
  username: YOUR_DOCKERHUB_USER
  password:
    - KAMAL_REGISTRY_PASSWORD

# ── Environment ───────────────────────────────────────────────────────────────
env:
  secret:
    - RAILS_MASTER_KEY
    - APP_IDEA_GROCERY_SAVER_DATABASE_PASSWORD
  clear:
    # Solid Queue runs in the dedicated `job` server above — not in Puma.
    SOLID_QUEUE_IN_PUMA: false
    # Points the app at the Kamal-managed Postgres accessory.
    DB_HOST: grocery_saver-db
    RAILS_LOG_LEVEL: info
    # TODO: replace with real domain
    APP_HOST: YOUR_DOMAIN

# ── SSH ───────────────────────────────────────────────────────────────────────
# TODO: switch to a non-root deploy user once server is hardened
ssh:
  user: root

# ── Aliases ───────────────────────────────────────────────────────────────────
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  - "grocery_saver_storage:/rails/storage"

asset_path: /rails/public/assets

# ── Builder ───────────────────────────────────────────────────────────────────
builder:
  arch: amd64
  # TODO: uncomment to speed up amd64 builds from an Apple Silicon laptop
  # remote: ssh://docker@YOUR_BUILD_SERVER_IP

# ── Accessories ───────────────────────────────────────────────────────────────
accessories:
  db:
    image: postgres:16
    host: YOUR_SERVER_IP
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: app_idea_grocery_saver
        POSTGRES_DB:   app_idea_grocery_saver_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
